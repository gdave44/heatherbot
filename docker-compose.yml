services:
  heatherbot:
    build:
      context: ./heatherbot
      dockerfile: Dockerfile
    container_name: heatherbot
    restart: unless-stopped
    networks:
      - ollama-net
    env_file:
      - ./heatherbot/.env
    ports:
      - 8888:8888
    volumes:
      - ./heatherbot/data:/app/data
      - ./heatherbot/config:/app/config
      - ./heatherbot/heather_telegram_bot.py:/app/heather_telegram_bot.py
    depends_on:
      - ollama
      - kokoro

networks:
  ollama-net:
    external: true
